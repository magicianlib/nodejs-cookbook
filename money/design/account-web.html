<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资金账户 - Web</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens ────────────────────────────────────── */
    :root {
      --color-primary: #F59E0B;
      --color-primary-hover: #D97706;
      --color-on-primary: #0F172A;
      --color-accent: #8B5CF6;
      --color-bg: #F3F4F8;
      --color-surface: #FFFFFF;
      --color-surface-hover: #F9FAFB;
      --color-foreground: #0F172A;
      --color-foreground-secondary: #475569;
      --color-muted: #94A3B8;
      --color-border: #E2E8F0;
      --color-border-light: #F1F5F9;
      --color-income: #EF4444;
      --color-income-bg: rgba(239, 68, 68, 0.06);
      --color-expense: #22C55E;
      --color-expense-bg: rgba(34, 197, 94, 0.06);
      --color-tab-active: #0F172A;
      --color-tab-inactive: #94A3B8;

      --font-sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'IBM Plex Mono', 'SF Mono', 'Cascadia Code', monospace;

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;

      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 2px 12px rgba(0, 0, 0, 0.08);

      --transition-fast: 120ms ease;
      --transition-base: 200ms ease;
    }

    /* ── Reset ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--color-bg);
      color: var(--color-foreground);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Top Bar ──────────────────────────────────────────── */
    .topbar {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 40;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-hover));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .topbar-logo-icon svg {
      width: 18px;
      height: 18px;
      color: var(--color-on-primary);
      stroke-width: 2.5;
    }

    .topbar-logo-text {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .topbar-breadcrumb {
      font-size: 13px;
      color: var(--color-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topbar-breadcrumb span { color: var(--color-foreground-secondary); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--color-foreground-secondary);
    }

    .topbar-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .icon-btn:hover {
      border-color: var(--color-muted);
      color: var(--color-foreground);
    }

    .icon-btn:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
      stroke-width: 2;
    }

    /* ── Main Layout ──────────────────────────────────────── */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 32px 48px;
    }

    /* ── Tab Bar ──────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 24px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-item {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-tab-inactive);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color var(--transition-fast), border-color var(--transition-fast);
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-family: var(--font-sans);
    }

    .tab-item:hover {
      color: var(--color-foreground-secondary);
    }

    .tab-item.active {
      color: var(--color-tab-active);
      border-bottom-color: var(--color-primary);
      font-weight: 600;
    }

    .tab-item:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: -2px;
      border-radius: 2px;
    }

    /* ── Account Card (single) ─────────────────────────────── */
    .account-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 24px 32px;
      margin-bottom: 24px;
      transition: box-shadow var(--transition-base);
      cursor: default;
    }

    .account-card:hover {
      box-shadow: var(--shadow-md);
    }

    .account-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .account-card-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .account-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-foreground);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .account-name .tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 3px;
      background: var(--color-border-light);
      color: var(--color-foreground-secondary);
    }

    .account-number {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--color-foreground-secondary);
      letter-spacing: 0.02em;
    }

    .account-card-balance-area {
      text-align: right;
    }

    .account-balance .amount-row {
      font-family: var(--font-mono);
      font-size: 26px;
      font-weight: 600;
      color: var(--color-foreground);
      display: flex;
      align-items: baseline;
      justify-content: flex-end;
      flex-wrap: nowrap;
      white-space: nowrap;
      gap: 0;
    }

    .amount-row .currency-symbol {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-foreground-secondary);
      margin-right: 3px;
      position: relative;
      top: -1px;
    }

    .amount-row .amount-digits {
      letter-spacing: 0.01em;
    }

    .amount-row .amount-scale {
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-sans);
      color: var(--color-primary);
      margin: 0 2px;
      position: relative;
      top: -1px;
    }

    .amount-row .amount-fraction {
      color: var(--color-foreground-secondary);
    }

    .amount-row .currency-code {
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-sans);
      letter-spacing: 0.06em;
      color: var(--color-foreground-secondary);
      background: var(--color-border-light);
      padding: 2px 7px;
      border-radius: 3px;
      margin-left: 8px;
      position: relative;
      top: -1px;
      flex-shrink: 0;
    }

    .balance-label-sm {
      font-size: 12px;
      color: var(--color-muted);
      margin-top: 4px;
      text-align: right;
    }

    .account-card-bottom {
      display: flex;
      gap: 24px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--color-border-light);
    }

    .account-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .account-stat-label {
      font-size: 12px;
      color: var(--color-muted);
    }

    .account-stat-value {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
    }

    .account-stat-value.income { color: var(--color-income); }
    .account-stat-value.expense { color: var(--color-expense); }

    .stat-row {
      display: flex;
      gap: 0;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--color-border-light);
    }

    .stat-cell {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 8px 0;
    }

    .stat-cell + .stat-cell {
      border-left: 1px solid var(--color-border-light);
      padding-left: 20px;
    }

    .stat-cell:first-child {
      padding-left: 0;
    }

    .stat-cell-header {
      font-size: 12px;
      color: var(--color-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-cell-header .detail-link {
      font-size: 11px;
      font-weight: 500;
      color: var(--color-primary);
      text-decoration: none;
      cursor: pointer;
      transition: opacity var(--transition-fast);
    }

    .stat-cell-header .detail-link:hover { opacity: 0.7; }
    .stat-cell-header .detail-link:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 1px; border-radius: 2px; }

    .stat-cell-value {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 500;
      color: var(--color-foreground);
      display: inline-flex;
      align-items: flex-end;
      flex-wrap: nowrap;
      white-space: nowrap;
    }

    .stat-cell-value .currency-symbol {
      font-size: inherit;
      font-weight: inherit;
      color: var(--color-foreground-secondary);
      margin-right: 3px;
    }

    .stat-cell-value .amount-digits {
      letter-spacing: 0.01em;
      line-height: 1;
    }

    .stat-cell-value .amount-scale {
      font-size: 11px;
      font-weight: 700;
      font-family: var(--font-sans);
      color: var(--color-primary);
      margin: 0 1px;
      line-height: 1;
    }

    .stat-cell-value .amount-fraction {
      color: var(--color-foreground-secondary);
    }

    .stat-cell-value.pending { color: var(--color-primary); }
    .stat-cell-value.pending .amount-scale { color: var(--color-primary); }

    /* ── Filter Bar ───────────────────────────────────────── */
    .filter-bar {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .filter-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--color-muted);
    }

    .filter-input {
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg);
      color: var(--color-foreground);
      font-family: var(--font-sans);
      font-size: 13px;
      transition: border-color var(--transition-fast);
      -webkit-appearance: none;
    }

    .filter-input:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .filter-input::placeholder {
      color: var(--color-muted);
    }

    .filter-input[type="date"] {
      font-family: var(--font-mono);
      width: 140px;
    }

    .filter-input[type="text"] {
      width: 160px;
    }

    .filter-input.select {
      width: 120px;
      cursor: pointer;
    }

    .filter-actions {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-left: auto;
    }

    .btn {
      height: 36px;
      padding: 0 16px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all var(--transition-fast);
    }

    .btn svg {
      width: 14px;
      height: 14px;
      stroke-width: 2;
    }

    .btn:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    .btn-ghost {
      background: transparent;
      color: var(--color-primary);
      border: 1px solid var(--color-border);
    }

    .btn-ghost:hover {
      background: var(--color-border-light);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-hover));
      color: var(--color-on-primary);
    }

    .btn-primary:hover { opacity: 0.9; }

    .btn-add {
      background: transparent;
      color: var(--color-foreground-secondary);
      border: 1px solid var(--color-border);
    }

    .btn-add:hover {
      background: var(--color-border-light);
      color: var(--color-foreground);
    }

    /* ── Data Table ───────────────────────────────────────── */
    .table-section {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--color-border);
    }

    .table-title {
      font-size: 14px;
      font-weight: 600;
    }

    .table-count {
      font-size: 12px;
      color: var(--color-muted);
      margin-left: 8px;
      font-weight: 400;
    }

    .table-scroll {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background: var(--color-bg);
    }

    th {
      padding: 10px 16px;
      text-align: left;
      font-weight: 500;
      color: var(--color-muted);
      font-size: 12px;
      white-space: nowrap;
      border-bottom: 1px solid var(--color-border);
    }

    td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--color-border-light);
      white-space: nowrap;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td {
      background: var(--color-surface-hover);
    }

    .tx-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 500;
    }

    .tx-type-badge svg {
      width: 12px;
      height: 12px;
      stroke-width: 2.5;
    }

    .tx-type-badge.income {
      background: var(--color-income-bg);
      color: var(--color-income);
    }

    .tx-type-badge.expense {
      background: var(--color-expense-bg);
      color: var(--color-expense);
    }

    .tx-mono {
      font-family: var(--font-mono);
      font-size: 13px;
    }

    .tx-amount-cell {
      font-family: var(--font-mono);
      font-weight: 500;
      text-align: right;
    }

    .tx-amount-cell.income { color: var(--color-income); }
    .tx-amount-cell.expense { color: var(--color-expense); }

    .tx-balance {
      font-family: var(--font-mono);
      color: var(--color-foreground-secondary);
      text-align: right;
    }

    .status-badge {
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-badge.success {
      background: var(--color-expense-bg);
      color: var(--color-expense);
    }

    .status-badge.pending {
      background: rgba(245, 158, 11, 0.08);
      color: #B45309;
    }

    /* Pagination */
    .table-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-top: 1px solid var(--color-border);
    }

    .pagination-info {
      font-size: 12px;
      color: var(--color-muted);
    }

    .pagination {
      display: flex;
      gap: 4px;
    }

    .page-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-foreground-secondary);
      font-size: 13px;
      font-family: var(--font-sans);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }

    .page-btn:hover {
      background: var(--color-border-light);
    }

    .page-btn.active {
      background: var(--color-foreground);
      color: var(--color-surface);
      border-color: var(--color-foreground);
    }

    .page-btn:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    /* ── Modal ─────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--transition-base), visibility var(--transition-base);
    }

    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      width: 440px;
      max-width: calc(100vw - 32px);
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.15);
      transform: translateY(12px) scale(0.98);
      transition: transform 300ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 0;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--color-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition-fast), color var(--transition-fast);
    }

    .modal-close:hover {
      background: var(--color-bg);
      color: var(--color-foreground);
    }

    .modal-close:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    .modal-close svg {
      width: 18px;
      height: 18px;
      stroke-width: 2;
    }

    .modal-body {
      padding: 20px 24px 24px;
    }

    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }

    .type-btn {
      height: 44px;
      border-radius: var(--radius-sm);
      border: 2px solid var(--color-border);
      background: transparent;
      color: var(--color-muted);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .type-btn svg {
      width: 16px;
      height: 16px;
      stroke-width: 2.5;
    }

    .type-btn.income-btn.active {
      border-color: var(--color-income);
      background: var(--color-income-bg);
      color: var(--color-income);
    }

    .type-btn.expense-btn.active {
      border-color: var(--color-expense);
      background: var(--color-expense-bg);
      color: var(--color-expense);
    }

    .type-btn:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-muted);
      margin-bottom: 5px;
    }

    .form-input {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      background: var(--color-bg);
      color: var(--color-foreground);
      font-family: var(--font-mono);
      font-size: 14px;
      transition: border-color var(--transition-fast);
      -webkit-appearance: none;
    }

    .form-input.text-input {
      font-family: var(--font-sans);
    }

    .form-input:focus {
      outline: none;
      border-color: var(--color-primary);
    }

    .form-input::placeholder {
      color: var(--color-muted);
      font-family: var(--font-sans);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .form-error {
      font-size: 12px;
      color: var(--color-income);
      margin-top: 3px;

    /* ── Amount Formatting ────────────────────────────────── */
    function formatScaledAmount(num, locale) {
      var isCn = (!locale || locale === 'zh-CN' || locale === 'zh-TW');
      var parts = num.toFixed(2).split('.');
      var fraction = '.' + parts[1];
      var intNum = parseInt(parts[0], 10);
      return isCn ? fmtCn(intNum, fraction) : fmtWestern(intNum, fraction);
    }

    function fmtCn(n, f) {
      if (n < 10000) return d(n.toLocaleString('en-US')) + fr(f);
      var yi = Math.floor(n / 100000000), rem = n % 100000000;
      var wan = Math.floor(rem / 10000), ge = rem % 10000;
      var h = '';
      if (yi > 0) h += d(yi.toLocaleString('en-US')) + s('亿');
      if (wan > 0) { var w = yi > 0 ? String(wan).padStart(4, '0') : wan.toLocaleString('en-US'); h += d(w) + s('万'); }
      if (ge > 0) { var g = (yi > 0 || wan > 0) ? String(ge).padStart(4, '0') : ge.toLocaleString('en-US'); h += d(g); }
      return h + fr(f);
    }

    function fmtWestern(n, f) {
      if (n < 1000) return d(n.toLocaleString('en-US')) + fr(f);
      var b = Math.floor(n / 1e9), r1 = n % 1e9, m = Math.floor(r1 / 1e6), r2 = r1 % 1e6, k = Math.floor(r2 / 1e3), ge = r2 % 1e3;
      var h = '';
      if (b > 0) h += d(b.toLocaleString('en-US')) + s('B');
      if (m > 0) { h += d(b > 0 ? String(m).padStart(3, '0') : m.toLocaleString('en-US')) + s('M'); }
      if (k > 0) { h += d((b > 0 || m > 0) ? String(k).padStart(3, '0') : k.toLocaleString('en-US')) + s('K'); }
      if (ge > 0) { h += d((b > 0 || m > 0 || k > 0) ? String(ge).padStart(3, '0') : ge.toLocaleString('en-US')); }
      return h + fr(f);
    }

    function d(v) { return '<span class="amount-digits">' + v + '</span>'; }
    function s(v) { return '<span class="amount-scale">' + v + '</span>'; }
    function fr(v) { return '<span class="amount-fraction">' + v + '</span>'; }

    function formatMoney(n) {
      return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // Full scaled format with HTML markup (same as balance display)
    function formatScaledHTML(num, locale, symbol) {
      return '<span class="currency-symbol">' + symbol + '</span>' +
             formatScaledAmount(num, locale);
    }

    /* ── Monthly Stats ────────────────────────────────────── */
    function monthlyStats() {
      var now = new Date();
      var ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
      var inc = 0, exp = 0;
      getTx().forEach(function (tx) {
        if (tx.date.substring(0, 7) === ym) {
          if (tx.type === 'income') inc += tx.amount;
          else exp += tx.amount;
        }
      });
      return { income: inc, expense: exp };
    }

    /* ── Render Table ─────────────────────────────────────── */
    var tableBody = document.getElementById('tableBody');
    var tableCount = document.getElementById('tableCount');
    var paginationInfo = document.getElementById('paginationInfo');
    var thAmount = document.getElementById('thAmount');
    var thBalance = document.getElementById('thBalance');

    function renderTable(data) {
      var acc = getAcc();
      var cur = acc.currency;
      thAmount.textContent = '金额 (' + cur + ')';
      thBalance.textContent = '余额 (' + cur + ')';
      tableCount.textContent = '共 ' + data.length + ' 条';
      paginationInfo.textContent = '显示 1-' + data.length + ' 条，共 ' + data.length + ' 条';

      // Compute running balance
      var bal = acc.balance;
      var balances = [];
      for (var i = 0; i < data.length; i++) {
        balances[i] = bal;
        if (data[i].type === 'income') bal -= data[i].amount;
        else bal += data[i].amount;
      }

      tableBody.innerHTML = data.map(function (tx, idx) {
        var typeLabel = tx.type === 'income' ? '收入' : '支出';
        var arrow = tx.type === 'income'
          ? '<path stroke-linecap="round" stroke-linejoin="round" d="M12 19.5v-15m0 0-6.75 6.75M12 4.5l6.75 6.75" />'
          : '<path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m0 0 6.75-6.75M12 19.5l-6.75-6.75" />';
        var prefix = tx.type === 'income' ? '+' : '-';
        var statusLabel = tx.status === 'success' ? '已完成' : '处理中';
        return '<tr>' +
          '<td class="tx-mono">' + tx.date + '</td>' +
          '<td class="tx-mono" style="color:var(--color-foreground-secondary)">' + tx.txNo + '</td>' +
          '<td>' + tx.name + '</td>' +
          '<td><span class="tx-type-badge ' + tx.type + '"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">' + arrow + '</svg>' + typeLabel + '</span></td>' +
          '<td><span class="status-badge ' + tx.status + '">' + statusLabel + '</span></td>' +
          '<td class="tx-amount-cell ' + tx.type + '">' + prefix + acc.symbol + formatMoney(tx.amount) + '</td>' +
          '<td class="tx-balance">' + acc.symbol + formatMoney(balances[idx]) + '</td>' +
        '</tr>';
      }).join('');
    }

    /* ── Tab Switching ─────────────────────────────────────── */
    document.querySelectorAll('.tab-item').forEach(function (tab) {
      tab.addEventListener('click', function () {
        document.querySelector('.tab-item.active').classList.remove('active');
        this.classList.add('active');
        activeTab = this.dataset.tab;
        renderAccount();
        applyFilter();
      });
    });

    /* ── Filter ────────────────────────────────────────────── */
    var filterType = document.getElementById('filterType');
    var filterSearch = document.getElementById('filterSearch');
    var filterDateStart = document.getElementById('filterDateStart');
    var filterDateEnd = document.getElementById('filterDateEnd');

    function applyFilter() {
      var type = filterType.value;
      var search = filterSearch.value.trim().toLowerCase();
      var start = filterDateStart.value;
      var end = filterDateEnd.value;
      var filtered = getTx().filter(function (tx) {
        if (type && tx.type !== type) return false;
        if (search && tx.name.toLowerCase().indexOf(search) === -1) return false;
        var d = tx.date.substring(0, 10);
        if (start && d < start) return false;
        if (end && d > end) return false;
        return true;
      });
      renderTable(filtered);
    }

    filterType.addEventListener('change', applyFilter);
    filterSearch.addEventListener('input', applyFilter);
    filterDateStart.addEventListener('change', applyFilter);
    filterDateEnd.addEventListener('change', applyFilter);

    document.getElementById('btnReset').addEventListener('click', function () {
      filterType.value = '';
      filterSearch.value = '';
      filterDateStart.value = '2026-06-01';
      filterDateEnd.value = '2026-06-30';
      applyFilter();
    });

    /* ── Modal ─────────────────────────────────────────────── */
    var modalOverlay = document.getElementById('modalOverlay');
    var typeIncome = document.getElementById('typeIncome');
    var typeExpense = document.getElementById('typeExpense');
    var inputAmount = document.getElementById('inputAmount');
    var inputDesc = document.getElementById('inputDesc');
    var inputDate = document.getElementById('inputDate');
    var modalAccountName = document.getElementById('modalAccountName');
    var btnSubmit = document.getElementById('btnSubmit');
    var errorAmount = document.getElementById('errorAmount');

    function openModal(presetType) {
      currentType = presetType || 'income';
      updateTypeToggle();
      inputAmount.value = '';
      inputDesc.value = '';
      inputDate.value = new Date().toISOString().split('T')[0];
      var acc = getAcc();
      modalAccountName.textContent = acc.name + ' (' + acc.tag + ')';
      errorAmount.textContent = '';
      modalOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      setTimeout(function () { inputAmount.focus(); }, 300);
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    function updateTypeToggle() {
      typeIncome.classList.toggle('active', currentType === 'income');
      typeExpense.classList.toggle('active', currentType === 'expense');
      typeIncome.setAttribute('aria-pressed', currentType === 'income');
      typeExpense.setAttribute('aria-pressed', currentType === 'expense');
    }

    document.getElementById('btnAdd').addEventListener('click', function () { openModal('income'); });
    document.getElementById('modalClose').addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', function (e) { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal(); });

    typeIncome.addEventListener('click', function () { currentType = 'income'; updateTypeToggle(); });
    typeExpense.addEventListener('click', function () { currentType === 'expense'; updateTypeToggle(); });

    btnSubmit.addEventListener('click', function () {
      var amount = parseFloat(inputAmount.value);
      if (!amount || amount <= 0) { errorAmount.textContent = '请输入有效金额'; inputAmount.focus(); return; }
      errorAmount.textContent = '';
      var desc = inputDesc.value.trim() || (currentType === 'income' ? '收入' : '支出');
      var date = inputDate.value || new Date().toISOString().split('T')[0];
      var acc = getAcc();

      if (currentType === 'income') acc.balance += amount;
      else acc.balance -= amount;

      getTx().unshift({
        type: currentType,
        name: desc,
        amount: amount,
        date: date + ' ' + new Date().toTimeString().substring(0, 5),
        status: 'success',
        txNo: 'TX' + date.replace(/-/g, '') + String(getTx().length + 1).padStart(3, '0')
      });

      renderAccount();
      applyFilter();
      closeModal();
    });

    /* ── Initial Render ───────────────────────────────────── */
    renderAccount();
    applyFilter();
  </script>

</body>
</html>
